<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú 3D Interactivo</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        
        /* Contenedor del modelo */
        model-viewer {
            width: 100%;
            height: 85vh;
            background-color: #ffffff;
        }

        /* Botón de Pedido */
        .btn-pedir {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 50px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .btn-pedir:active { transform: translateX(-50%) scale(0.95); }
        .btn-pedir:disabled { background: #95a5a6; }

        /* Estilo del botón AR nativo de Google */
        #ar-button {
            background-color: white;
            border-radius: 10px;
            border: 1px solid #ddd;
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="plato1.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1">
        
        <button slot="ar-button" id="ar-button">
            📸 VER EN MI MESA
        </button>
    </model-viewer>

    <button id="botonPedido" class="btn-pedir" onclick="enviarPedido()">
        PEDIR AHORA
    </button>

    <script>
        async function enviarPedido() {
            const btn = document.getElementById('botonPedido');
            
            // --- PEGA TU URL DE MAKE AQUÍ ABAJO ---
            const urlWebhook = "TU_URL_DE_WEBHOOK_AQUI"; 
            // ---------------------------------------

            // Desactivamos el botón visualmente
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            // Datos que viajarán a Airtable
            const datosParaAirtable = {
                plato: "Hamburguesa Gourmet AR",
                mesa: "Mesa Terraza 05",
                notas: "Cliente pidió desde menú 3D interactivo"
            };

            try {
                const response = await fetch(urlWebhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datosParaAirtable)
                });

                if (response.ok) {
                    alert("✅ ¡Éxito! Tu pedido ya está en la interface de cocina.");
                    btn.innerText = "¡PEDIDO ENVIADO!";
                    btn.style.background = "#27ae60";
                } else {
                    throw new Error("Error en el servidor");
                }
            } catch (error) {
                alert("❌ Error: No se pudo conectar con el sistema. Revisa tu internet.");
                btn.disabled = false;
                btn.innerText = "REINTENTAR PEDIDO";
                console.error(error);
            }
        }
    </script>
</body>
</html>
