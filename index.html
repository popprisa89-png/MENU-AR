<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú AR - Demo</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        model-viewer { width: 100%; height: 90vh; background-color: #f5f5f5; }
        .btn-pedir {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; background-color: #e67e22; color: white;
            border: none; border-radius: 30px; font-size: 18px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="plato1.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1">
        
        <button slot="ar-button" style="background-color: white; border-radius: 8px; border: none; position: absolute; top: 20px; right: 20px; padding: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
            👋 Ver en mi mesa
        </button>

    </model-viewer>

    <button class="btn-pedir" onclick="enviarPedido()">
        PEDIR AHORA
    </button>

</body>
</html>
<script>
    function enviarPedido() {
        const urlWebhook = "PEGA_AQUÍ_TU_URL_DE_MAKE";
        
        const datosPedido = {
            plato: "Hamburguesa Demo", // Aquí pondrás el nombre del plato
            mesa: "Mesa VIP 01",
            notas: "Sin cebolla, extra queso"
        };

        fetch(urlWebhook, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datosPedido)
        })
        .then(response => {
            alert("✅ ¡Pedido recibido en cocina!");
        })
        .catch(error => {
            alert("❌ Error al enviar pedido");
            console.error(error);
        });
    }
</script>
